<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Navegador de arquivos para seleção de imagens no editor TinyMCE">
    <meta name="keywords" content="tinymce, navegador, arquivos, imagens, upload">
    <title>Navegador de Arquivos - TinyMCE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .file-item {
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        .file-item:hover {
            border-color: #007bff;
            transform: scale(1.02);
        }
        .file-item.selected {
            border-color: #28a745;
            background-color: #f8f9fa;
        }
        .file-thumbnail {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
        }
        .loading {
            text-align: center;
            padding: 50px;
        }
        .hidden {
            display: none;
        }
        .folder-item {
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            background-color: #f8f9fa;
        }
        .folder-item:hover {
            border-color: #ffc107;
            transform: scale(1.02);
            background-color: #fff3cd;
        }
        .folder-icon {
            font-size: 4rem;
            color: #ffc107;
        }
        .breadcrumb-item + .breadcrumb-item::before {
            content: "/";
        }
    </style>
</head>
<body>
    <div class="container-fluid p-3">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="mb-0"><i class="fas fa-images me-2"></i>Selecionar Imagem</h5>
            <button type="button" class="btn btn-sm btn-outline-secondary" onclick="refreshFiles()">
                <i class="fas fa-sync-alt"></i> Atualizar
            </button>
        </div>
        
        <!-- Breadcrumb Navigation -->
        <nav aria-label="breadcrumb" id="breadcrumb-nav" class="mb-3 hidden">
            <ol class="breadcrumb mb-0">
                <li class="breadcrumb-item">
                    <a href="#" onclick="navigateToPath('')" class="text-decoration-none">
                        <i class="fas fa-home"></i> Início
                    </a>
                </li>
                <span id="breadcrumb-items"></span>
            </ol>
        </nav>
        
        <div id="loading" class="loading">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Carregando...</span>
            </div>
            <p class="mt-2">Carregando arquivos...</p>
        </div>
        
        <div id="files-container" class="row g-3 hidden"></div>
        
        <div id="no-files" class="text-center py-5 hidden">
            <i class="fas fa-folder-open fa-3x text-muted mb-3"></i>
            <p class="text-muted">Nenhuma imagem encontrada</p>
        </div>
        
        <div class="d-flex justify-content-end mt-4">
            <button type="button" class="btn btn-secondary me-2" onclick="window.close()">
                <i class="fas fa-times me-1"></i>Cancelar
            </button>
            <button type="button" class="btn btn-primary" id="select-btn" onclick="selectFile()" disabled>
                <i class="fas fa-check me-1"></i>Selecionar
            </button>
        </div>
    </div>

    <script>
        let selectedFile = null;
        let currentPath = '';
        
        function loadFiles(path = '') {
            currentPath = path;
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('files-container').classList.add('hidden');
            document.getElementById('no-files').classList.add('hidden');
            
            const url = path ? `/blog/tinymce/browse/?path=${encodeURIComponent(path)}` : '/blog/tinymce/browse/';
            
            fetch(url)
                .then(response => response.json())
                .then(data => {
                    document.getElementById('loading').classList.add('hidden');
                    
                    updateBreadcrumb(data.current_path, data.parent_path);
                    
                    if ((data.folders && data.folders.length > 0) || (data.files && data.files.length > 0)) {
                        displayItems(data.folders || [], data.files || []);
                    } else {
                        document.getElementById('no-files').classList.remove('hidden');
                    }
                })
                .catch(error => {
                    console.error('Erro ao carregar arquivos:', error);
                    document.getElementById('loading').classList.add('hidden');
                    document.getElementById('no-files').classList.remove('hidden');
                });
        }
        
        function displayItems(folders, files) {
            const container = document.getElementById('files-container');
            container.innerHTML = '';
            
            // Exibir pastas primeiro
            folders.forEach(folder => {
                const folderDiv = document.createElement('div');
                folderDiv.className = 'col-md-3 col-sm-4 col-6';
                
                folderDiv.innerHTML = `
                    <div class="card folder-item" onclick="navigateToPath('${folder.path}')">
                        <div class="card-body text-center p-3">
                            <i class="fas fa-folder folder-icon mb-2"></i>
                            <h6 class="card-title small mb-0" title="${folder.name}">${truncateText(folder.name, 15)}</h6>
                        </div>
                    </div>
                `;
                
                container.appendChild(folderDiv);
            });
            
            // Exibir arquivos
            files.forEach(file => {
                const fileDiv = document.createElement('div');
                fileDiv.className = 'col-md-3 col-sm-4 col-6';
                
                const fileSize = formatFileSize(file.size);
                const fileDate = new Date(file.modified).toLocaleDateString('pt-BR');
                
                fileDiv.innerHTML = `
                    <div class="card file-item" onclick="selectFileItem(this, '${file.url}', '${file.name}')">
                        <img src="${file.url}" class="file-thumbnail" alt="${file.name}" loading="lazy">
                        <div class="card-body p-2">
                            <h6 class="card-title small mb-1" title="${file.name}">${truncateText(file.name, 20)}</h6>
                            <small class="text-muted">
                                ${fileSize} • ${fileDate}
                            </small>
                        </div>
                    </div>
                `;
                
                container.appendChild(fileDiv);
            });
            
            document.getElementById('files-container').classList.remove('hidden');
        }
        
        function selectFileItem(element, url, name) {
            // Remove seleção anterior
            document.querySelectorAll('.file-item').forEach(item => {
                item.classList.remove('selected');
            });
            
            // Adiciona seleção atual
            element.classList.add('selected');
            
            selectedFile = { url, name };
            document.getElementById('select-btn').disabled = false;
        }
        
        function selectFile() {
            if (selectedFile && window.opener) {
                // Chama a função callback do TinyMCE
                if (window.opener.tinymceFileCallback) {
                    window.opener.tinymceFileCallback(selectedFile.url, { title: selectedFile.name });
                }
                window.close();
            }
        }
        
        function refreshFiles() {
            selectedFile = null;
            document.getElementById('select-btn').disabled = true;
            loadFiles(currentPath);
        }
        
        function navigateToPath(path) {
            selectedFile = null;
            document.getElementById('select-btn').disabled = true;
            loadFiles(path);
        }
        
        function updateBreadcrumb(currentPath, parentPath) {
            const breadcrumbNav = document.getElementById('breadcrumb-nav');
            const breadcrumbItems = document.getElementById('breadcrumb-items');
            
            if (!currentPath) {
                breadcrumbNav.classList.add('hidden');
                return;
            }
            
            breadcrumbNav.classList.remove('hidden');
            breadcrumbItems.innerHTML = '';
            
            const pathParts = currentPath.split('/');
            let buildPath = '';
            
            pathParts.forEach((part, index) => {
                if (part) {
                    buildPath += (buildPath ? '/' : '') + part;
                    const isLast = index === pathParts.length - 1;
                    
                    const breadcrumbItem = document.createElement('li');
                    breadcrumbItem.className = `breadcrumb-item${isLast ? ' active' : ''}`;
                    
                    if (isLast) {
                        breadcrumbItem.textContent = part;
                        breadcrumbItem.setAttribute('aria-current', 'page');
                    } else {
                        breadcrumbItem.innerHTML = `
                            <a href="#" onclick="navigateToPath('${buildPath}')" class="text-decoration-none">
                                ${part}
                            </a>
                        `;
                    }
                    
                    breadcrumbItems.appendChild(breadcrumbItem);
                }
            });
        }
        
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
        
        function truncateText(text, maxLength) {
            if (text.length <= maxLength) return text;
            return text.substring(0, maxLength) + '...';
        }
        
        // Carregar arquivos ao inicializar
        document.addEventListener('DOMContentLoaded', () => loadFiles());
    </script>
</body>
</html>

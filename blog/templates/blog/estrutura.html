{% extends "blog/base.html" %}
{% load static %}
{% block title %}{{ page_title }} - ECC Nacional{% endblock title %}

{% block extra_css %}
<style>
    .page-hero {
        background: linear-gradient(135deg, var(--primary-color) 0%, #3b82f6 100%);
        padding: 80px 0 60px;
        margin-top: var(--navbar-height);
        color: white;
    }
    .estrutura-img {
        max-width: 100%;
        border-radius: 16px;
        box-shadow: 0 15px 50px rgba(0,0,0,0.15);
        transition: transform 0.3s ease;
    }
    .estrutura-img:hover {
        transform: scale(1.01);
    }
</style>
{% endblock extra_css %}

{% block content %}
<section class="page-hero text-center">
    <div class="container">
        <h1 class="fw-bold mb-2">
            <i class="fas fa-sitemap me-3"></i>Estrutura de Direção
        </h1>
        <p class="lead opacity-75">Organização e direção do ECC Nacional</p>
    </div>
</section>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 text-center">
            <img src="{% static 'assets/img/estruturadirecao.gif' %}"
                 alt="Estrutura de Direção do ECC Nacional"
                 class="estrutura-img img-fluid">
        </div>
    </div>
</div>
{% endblock content %}

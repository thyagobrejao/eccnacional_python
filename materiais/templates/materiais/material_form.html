{% extends "base.html" %}

{% block title %}{{ page_title }} - ECC Nacional{% endblock title %}

{% block content %}
<div class="row">
  <div class="col-12 col-lg-6">
    <div class="card">
      <div class="card-header">
        <h4 class="card-title mb-0">{{ page_title }}</h4>
      </div>
      <div class="card-body">
        <form method="post" novalidate>
          {% csrf_token %}

          <div class="mb-3">
            <label for="{{ form.descricao.id_for_label }}" class="form-label">Descrição</label>
            {{ form.descricao }}
            {% if form.descricao.errors %}
              <div class="text-danger small">{{ form.descricao.errors.0 }}</div>
            {% endif %}
          </div>

          <div class="d-flex justify-content-end gap-2 mt-4">
            <a href="{% url 'materiais:list' %}" class="btn btn-outline-secondary">
              <i class="ri ri-arrow-left-line me-1"></i>Cancelar
            </a>
            <button type="submit" class="btn btn-primary">
              <i class="ri ri-save-line me-1"></i>Salvar
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock content %}
